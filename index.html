<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Secure bilingual registration portal for international students."
    />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23155eef'/%3E%3C/svg%3E" />
    <title>International Student Registration</title>
    <style>
      body { margin: 0; background: #0a1628; }
      #root { min-height: 100vh; }
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0a1628;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }
      #loading-screen.hidden { opacity: 0; }
      .loading-spinner {
        width: 40px; height: 40px; border-radius: 50%;
        border: 3px solid #2a4a7a;
        border-top-color: #3b82f6;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
